<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aegis Pro</title>
    <style>
        body {
            width: 320px;
            height: 240px;
            margin: 0;
            padding: 16px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .header {
            text-align: center;
            margin-bottom: 20px;
        }
        
        .header h1 {
            margin: 0;
            font-size: 18px;
            font-weight: 600;
        }
        
        .header p {
            margin: 4px 0 0 0;
            font-size: 12px;
            opacity: 0.8;
        }
        
        .status {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 16px;
        }
        
        .trust-score {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 8px;
        }
        
        .score-value {
            font-size: 24px;
            font-weight: bold;
        }
        
        .score-label {
            font-size: 12px;
            opacity: 0.8;
        }
        
        .progress-bar {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 3px;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            background: #4ade80;
            transition: width 0.3s ease;
        }
        
        .findings {
            font-size: 12px;
            opacity: 0.8;
        }
        
        .actions {
            display: flex;
            gap: 8px;
        }
        
        .btn {
            flex: 1;
            padding: 8px 12px;
            border: none;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        .btn-primary {
            background: #4ade80;
            color: #065f46;
        }
        
        .btn-primary:hover {
            background: #22c55e;
        }
        
        .btn-secondary {
            background: rgba(255, 255, 255, 0.2);
            color: white;
        }
        
        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.3);
        }
        
        .loading {
            text-align: center;
            padding: 20px;
            font-size: 14px;
        }
        
        .error {
            background: rgba(239, 68, 68, 0.2);
            border-radius: 6px;
            padding: 12px;
            font-size: 12px;
            margin-bottom: 16px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1> Aegis Pro</h1>
        <p>Dark Pattern Detection</p>
    </div>
    
    <div id="loading" class="loading">
        Scanning current page...
    </div>
    
    <div id="error" class="error" style="display: none;">
        Unable to scan page. Please try refreshing.
    </div>
    
    <div id="results" style="display: none;">
        <div class="status">
            <div class="trust-score">
                <div>
                    <div class="score-value" id="score-value">--</div>
                    <div class="score-label">Trust Score</div>
                </div>
                <div id="risk-indicator" style="font-size: 24px;">--</div>
            </div>
            <div class="progress-bar">
                <div class="progress-fill" id="progress-fill"></div>
            </div>
            <div class="findings" id="findings-text">
                Analyzing...
            </div>
        </div>
        
        <div class="actions">
            <button class="btn btn-primary" id="view-details">View Details</button>
            <button class="btn btn-secondary" id="scan-page">Scan Again</button>
        </div>
    </div>
    
    <script src="popup.js"></script>
</body>
</html>
